<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    *{
        margin: 0;
        padding: 0;
    }

    .container {
        background-color: aqua;
        max-width: 800px;
        min-height: 400px;
        margin: 20px;

    }

    .container p{
        background-color: red;
        color: white;
        font-size: 25px;
        border: 1px solid black;
        box-sizing: border-box;
    }

    .flexcont{display: flex;

    flex-direction: column;
    flex-direction: row-reverse;
    flex-direction: column-reverse;
    flex-direction: row;

    justify-content: center;
    justify-content: flex-start;
    justify-content: flex-end;


    }

    p{
        width: 350px;
        height: 70px;
    }

    p:nth-child(1){
        flex-grow: 1;
        flex-shrink: 1;
        flex-basis: 100px;
    }

    p:nth-child(2){
        flex-grow: 2;
        flex-shrink: 2;

    }
    
</style>
<body>
<div class="container flexcont">
    <p>Hey</p>
    <p>there</p>
    <p>how</p>
    <p>are</p>
    <p>you</p>
</div>    
</body>
</html>
