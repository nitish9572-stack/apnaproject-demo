<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .hover-button{
        background-color: blue;
        color: white;
        padding: 10px 20px;
        border: none;
        font-size: 13px;
    }

    .hover-button:hover{
        background-color: red;
        transition: all 2s ease-in-out;
/* font-size: 25px; */
transform: translate(50px ,30px) rotateY(145deg);
    }
</style>

<body>
    <button class="hover-button">Hover me!</button>
</body>
</html>
