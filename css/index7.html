<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .inline-block-example{
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 5px;
        display: none;
    }
    .container {
        display:flex;
        flex-direction: column;
        background-color: aqua;
        justify-content: center;
        align-items: center;
        height: 80vh;
    }

    .flex-example {
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 5px;
    } 
    .container1{
        background-color: aqua;
        display: grid;
        grid-template-columns: repeat(3 , 1fr);
    }
    .grid-example{
        background-color: red;
        padding: 20px;
        font-size: 40px;
        text-align: center;
        margin: 5px;
    }
</style>

<body>
    <div class="container">
<div class="inline-block-example"></div>    
<div class="inline-block-example"></div>    
<div class="inline-block-example"></div>    
</div>

<div class="container">
    <div class="flex-example"></div>
    <div class="flex-example"></div>
    <div class="flex-example"></div>
</div> 

<div class="container1">
    <div class="grid-example">1</div>
    <div class="grid-example">2</div>
    <div class="grid-example">3</div>
    <div class="grid-example">4</div>
    <div class="grid-example">5</div>
    <div class="grid-example">6</div>
</div>

</body>
</html>
